<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price Tracker & Ratio Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.1em;
            font-weight: 300;
            opacity: 0.95;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .material-icons {
            font-size: 1.3em;
        }

        .crypto-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .crypto-list::-webkit-scrollbar {
            width: 6px;
        }

        .crypto-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .crypto-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .crypto-item {
            padding: 12px 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            font-size: 0.9em;
        }

        .crypto-item:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .crypto-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .price-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .price-display h3 {
            font-size: 1em;
            font-weight: 400;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .price-display .price {
            font-size: 2em;
            font-weight: 700;
        }

        .ratio-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .ratio-card h2 {
            color: white;
            margin-bottom: 30px;
        }

        .ratio-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .ratio-item {
            flex: 1;
            min-width: 200px;
        }

        .ratio-item h3 {
            font-size: 1.1em;
            font-weight: 400;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .ratio-item .value {
            font-size: 2.5em;
            font-weight: 700;
            word-break: break-all;
        }

        .ratio-separator {
            font-size: 1.5em;
            opacity: 0.6;
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .crypto-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .crypto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .crypto-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .crypto-card-header h3 {
            font-size: 1.2em;
            color: #667eea;
        }

        .crypto-card-header span {
            font-size: 0.8em;
            color: #888;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .crypto-card-price {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .crypto-card-change {
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .crypto-card-change.positive {
            background: #d4edda;
            color: #155724;
        }

        .crypto-card-change.negative {
            background: #f8d7da;
            color: #721c24;
        }

        .placeholder {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.1em;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.1em;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #721c24;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .main-content {
                grid-template-columns: 1fr;
            }

            .ratio-content {
                flex-direction: column;
            }

            .crypto-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Crypto Price Tracker</h1>
            <p>Real-time cryptocurrency prices and ratio analysis</p>
        </header>

        <div id="error-container"></div>

        <div class="main-content">
            <div class="card">
                <h2>
                    <span class="material-icons">currency_exchange</span>
                    Select First Crypto
                </h2>
                <div class="crypto-list" id="crypto-list-1"></div>
                <div class="price-display" id="price-display-1">
                    <h3>Price</h3>
                    <div class="price">-</div>
                </div>
            </div>

            <div class="card">
                <h2>
                    <span class="material-icons">currency_exchange</span>
                    Select Second Crypto
                </h2>
                <div class="crypto-list" id="crypto-list-2"></div>
                <div class="price-display" id="price-display-2">
                    <h3>Price</h3>
                    <div class="price">-</div>
                </div>
            </div>
        </div>

        <div class="card ratio-card" id="ratio-card" style="display: none;">
            <h2>
                <span class="material-icons">trending_up</span>
                Price Ratio
            </h2>
            <div class="ratio-content" id="ratio-content">
                <div class="ratio-item">
                    <h3 id="ratio-label-1"></h3>
                    <div class="ratio-item value" id="ratio-value-1">-</div>
                </div>
                <div class="ratio-separator">÷</div>
                <div class="ratio-item">
                    <h3 id="ratio-label-2"></h3>
                    <div class="ratio-item value" id="ratio-value-2">-</div>
                </div>
            </div>
        </div>

        <div>
            <h2 style="color: white; margin-top: 40px; margin-bottom: 20px; text-align: center; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);">
                <span class="material-icons" style="vertical-align: middle; margin-right: 10px;">show_chart</span>
                Live Market Data
            </h2>
            <div class="crypto-grid" id="crypto-grid"></div>
        </div>
    </div>

    <script>
        const CRYPTO_LIST = [
            { name: 'Bitcoin', symbol: 'BTC', id: 'bitcoin' },
            { name: 'Ethereum', symbol: 'ETH', id: 'ethereum' },
            { name: 'Tether', symbol: 'USDT', id: 'tether' },
            { name: 'USDC', symbol: 'USDC', id: 'usd-coin' },
            { name: 'Shiba Inu', symbol: 'SHIB', id: 'shiba-inu' },
            { name: 'Chainlink', symbol: 'LINK', id: 'chainlink' },
            { name: 'ApeCoin', symbol: 'APE', id: 'apecoin' },
            { name: 'Decentraland', symbol: 'MANA', id: 'decentraland' },
            { name: 'The Sandbox', symbol: 'SAND', id: 'the-sandbox' },
            { name: 'Quant', symbol: 'QNT', id: 'quant' },
            { name: 'Axie Infinity', symbol: 'AXS', id: 'axie-infinity' },
            { name: 'Aave', symbol: 'AAVE', id: 'aave' },
            { name: 'Lido DAO', symbol: 'LDO', id: 'lido-dao' },
            { name: 'Chiliz', symbol: 'CHZ', id: 'chiliz' },
            { name: 'CryptoTab Coin', symbol: 'CTC', id: 'cryptotab-coin' },
            { name: 'Wrapped Bitcoin', symbol: 'WBTC', id: 'wrapped-bitcoin' },
            { name: 'Wrapped Ethereum', symbol: 'WETH', id: 'wrapped-ethereum' },
            { name: 'Binance Coin', symbol: 'BNB', id: 'binancecoin' },
            { name: 'Solana', symbol: 'SOL', id: 'solana' },
            { name: 'ROX', symbol: 'ROX', id: 'rox' },
            { name: 'Pepe', symbol: 'PEPE', id: 'pepe' },
            { name: 'Dai', symbol: 'DAI', id: 'dai' },
            { name: 'Uniswap', symbol: 'UNI', id: 'uniswap' },
            { name: 'Tronix', symbol: 'TRX', id: 'tron' },
            { name: 'Litecoin', symbol: 'LTC', id: 'litecoin' },
            { name: 'Bitcoin Cash', symbol: 'BCH', id: 'bitcoin-cash' },
            { name: 'Dogecoin', symbol: 'DOGE', id: 'dogecoin' },
            { name: 'Toncoin', symbol: 'TON', id: 'ton' },
            { name: 'Polygon', symbol: 'POL', id: 'polygon' },
            { name: 'Arbitrum', symbol: 'ARB', id: 'arbitrum' },
            { name: 'Optimism', symbol: 'OP', id: 'optimism' }
        ];

        let selectedCrypto1 = null;
        let selectedCrypto2 = null;
        let pricesCache = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeCryptoLists();
            fetchPrices();
            setInterval(fetchPrices, 30000); // Update every 30 seconds
        });

        function initializeCryptoLists() {
            const list1 = document.getElementById('crypto-list-1');
            const list2 = document.getElementById('crypto-list-2');

            CRYPTO_LIST.forEach(crypto => {
                const item1 = createCryptoItem(crypto, 1);
                const item2 = createCryptoItem(crypto, 2);
                list1.appendChild(item1);
                list2.appendChild(item2);
            });
        }

        function createCryptoItem(crypto, selector) {
            const item = document.createElement('div');
            item.className = 'crypto-item';
            item.textContent = `${crypto.symbol}`;
            item.addEventListener('click', () => selectCrypto(crypto, selector));
            item.dataset.id = crypto.id;
            return item;
        }

        function selectCrypto(crypto, selector) {
            if (selector === 1) {
                selectedCrypto1 = crypto;
                updateSelection(1);
            } else {
                selectedCrypto2 = crypto;
                updateSelection(2);
            }
            updateRatioDisplay();
        }

        function updateSelection(selector) {
            const listId = `crypto-list-${selector}`;
            const items = document.querySelectorAll(`#${listId} .crypto-item`);
            items.forEach(item => item.classList.remove('selected'));

            const selected = selector === 1 ? selectedCrypto1 : selectedCrypto2;
            if (selected) {
                const selectedItem = document.querySelector(
                    `#${listId} .crypto-item[data-id="${selected.id}"]`
                );
                if (selectedItem) {
                    selectedItem.classList.add('selected');
                    updatePriceDisplay(selector);
                }
            }
        }

        function updatePriceDisplay(selector) {
            const crypto = selector === 1 ? selectedCrypto1 : selectedCrypto2;
            const displayId = `price-display-${selector}`;
            const display = document.getElementById(displayId);

            if (crypto && pricesCache[crypto.id]) {
                const price = pricesCache[crypto.id];
                display.querySelector('.price').textContent = formatPrice(price);
            }
        }

        function updateRatioDisplay() {
            const ratioCard = document.getElementById('ratio-card');

            if (!selectedCrypto1 || !selectedCrypto2) {
                ratioCard.style.display = 'none';
                return;
            }

            const price1 = pricesCache[selectedCrypto1.id];
            const price2 = pricesCache[selectedCrypto2.id];

            if (!price1 || !price2) {
                ratioCard.style.display = 'none';
                return;
            }

            ratioCard.style.display = 'block';

            const ratio = price1 / price2;

            document.getElementById('ratio-label-1').textContent = selectedCrypto1.symbol;
            document.getElementById('ratio-label-2').textContent = selectedCrypto2.symbol;
            document.getElementById('ratio-value-1').textContent = ratio.toFixed(6);
            document.getElementById('ratio-value-2').textContent = (1 / ratio).toFixed(6);
        }

        async function fetchPrices() {
            try {
                const ids = CRYPTO_LIST.map(c => c.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_market_cap=false&include_24hr_vol=false&include_24hr_change=true`
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch prices');
                }

                const data = await response.json();

                // Cache prices
                CRYPTO_LIST.forEach(crypto => {
                    if (data[crypto.id]) {
                        pricesCache[crypto.id] = data[crypto.id].usd;
                    }
                });

                updatePriceDisplay(1);
                updatePriceDisplay(2);
                updateRatioDisplay();
                updateCryptoGrid();

            } catch (error) {
                console.error('Error fetching prices:', error);
                showError('Failed to fetch prices. Please check your internet connection.');
            }
        }

        function updateCryptoGrid() {
            const grid = document.getElementById('crypto-grid');
            grid.innerHTML = '';

            CRYPTO_LIST.forEach(crypto => {
                if (pricesCache[crypto.id]) {
                    const price = pricesCache[crypto.id];
                    const card = document.createElement('div');
                    card.className = 'crypto-card';
                    
                    card.innerHTML = `
                        <div class="crypto-card-header">
                            <h3>${crypto.symbol}</h3>
                            <span>${crypto.name}</span>
                        </div>
                        <div class="crypto-card-price">$${formatPrice(price)}</div>
                    `;
                    
                    grid.appendChild(card);
                }
            });
        }

        function formatPrice(price) {
            if (price >= 1) {
                return price.toFixed(2);
            } else if (price >= 0.01) {
                return price.toFixed(4);
            } else {
                return price.toExponential(4);
            }
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
